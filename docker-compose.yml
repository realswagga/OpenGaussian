services:
  nginx:
    image: nginx:alpine
    depends_on:
      - public-web
      - admin-web
      - api
      - minio
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  public-web:
    build:
      context: .
      dockerfile: apps/public-web/Dockerfile
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_ASSET_BASE_URL=/assets
    depends_on:
      api:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    environment:
      - VITE_API_BASE_URL=/api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gsplat
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=gsplat-assets
      - S3_FORCE_PATH_STYLE=true
      - JWT_SECRET=local-dev-secret-change-me
      - ADMIN_SEED_EMAIL=admin@example.com
      - ADMIN_SEED_PASSWORD=admin12345
      - MAX_UPLOAD_MB=2048
      - ASSET_PUBLIC_URL=/assets
      - API_PUBLIC_URL=/api
      - APP_PUBLIC_URL=http://localhost:8080
      - S3_PUBLIC_ENDPOINT=http://localhost:8080/assets
      - DEFAULT_LOD_BUDGET=1500000
      - DEFAULT_MOBILE_LOD_BUDGET=500000
      - DEFAULT_VR_LOD_BUDGET=60000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gsplat
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=gsplat-assets
      - S3_FORCE_PATH_STYLE=true
      - WORKER_CONCURRENCY=1
      - NODE_OPTIONS=--max-old-space-size=4096
    depends_on:
      - api
      - postgres
      - redis
      - minio
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=gsplat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gsplat']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO bucket initialization - sets public-read policy for asset serving
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/gsplat-assets;
      mc anonymous set public local/gsplat-assets;
      echo 'Bucket gsplat-assets set to public-read';
      "

volumes:
  postgres-data:
  minio-data:
