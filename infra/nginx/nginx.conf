events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    upstream public_web {
        server public-web:80;
    }

    upstream admin_web {
        server admin-web:80;
    }

    upstream api {
        server api:4000;
    }

    # MinIO S3 API
    upstream minio_api {
        server minio:9000;
    }

    # MinIO Console
    upstream minio_console {
        server minio:9001;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 2048m;

        # Public web app
        location / {
            proxy_pass http://public_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin web app
        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            proxy_pass http://admin_web/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for job events
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # MinIO S3-compatible asset serving
        # Rewrite /assets/{key} to /{bucket}/{key} for MinIO S3 API
        location /assets/ {
            rewrite ^/assets/(.*) /gsplat-assets/$1 break;
            proxy_pass http://minio_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization "";

            # Immutable cache for versioned assets
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin "*";

            # Limit to GET/HEAD only
            limit_except GET HEAD OPTIONS {
                deny all;
            }
        }

        # MinIO console
        location /minio-console {
            proxy_pass http://minio_console;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}